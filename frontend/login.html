<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigShield — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #faf8f4;
  --bg2:       #f5f0e8;
  --surface:   #ffffff;
  --card:      #fffefb;
  --peach:     #f4a96a;
  --peach-lt:  #fde9d3;
  --peach-dk:  #e8874a;
  --sage:      #7ab5a0;
  --sage-lt:   #d6ede7;
  --sage-dk:   #4d9982;
  --lavender:  #9b8ec4;
  --lav-lt:    #e8e4f5;
  --lav-dk:    #7b6ba8;
  --rose:      #e07b8a;
  --rose-lt:   #fce8eb;
  --sky:       #6aaccc;
  --sky-lt:    #daeef7;
  --text:      #2d2a26;
  --text2:     #5a5650;
  --muted:     #9a948c;
  --border:    rgba(45,42,38,0.09);
  --shadow-sm: 0 2px 12px rgba(45,42,38,0.07);
  --shadow-md: 0 8px 32px rgba(45,42,38,0.10);
  --shadow-lg: 0 20px 60px rgba(45,42,38,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  position: relative;
}
.blob { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; }
body .blob:nth-child(1) { width: 500px; height: 500px; background: rgba(244,169,106,0.15); top: -100px; left: -100px; }
body .blob:nth-child(2) { width: 400px; height: 400px; background: rgba(122,181,160,0.15); bottom: -100px; right: -50px; }

.auth-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 28px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  position: relative;
  z-index: 1;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-header { text-align: center; margin-bottom: 32px; }
.auth-logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--peach-dk);
  letter-spacing: -0.3px;
  margin-bottom: 8px;
  text-decoration: none;
  display: inline-block;
}
.auth-logo span { color: var(--text); }
.auth-subtitle { color: var(--text2); font-size: 15px; }

.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
}
.form-control {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 14px 16px;
  border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-control:focus {
  border-color: var(--peach);
  box-shadow: 0 0 0 3px var(--peach-lt);
}

.forgot-link {
  display: block;
  text-align: right;
  font-size: 13px;
  color: var(--sage-dk);
  font-weight: 600;
  text-decoration: none;
  margin-top: 8px;
  transition: color 0.2s;
}
.forgot-link:hover { color: var(--text); }

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--peach), var(--peach-dk));
  color: #fff;
  border: none;
  padding: 15px;
  border-radius: 50px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 12px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(232,135,74,0.35);
  letter-spacing: 0.2px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(232,135,74,0.45);
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: var(--text2);
}
.auth-footer a {
  color: var(--sage-dk);
  font-weight: 700;
  text-decoration: none;
  transition: color 0.2s;
}
.auth-footer a:hover { color: var(--text); }

a.back-home {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  text-decoration: none;
  z-index: 10;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
a.back-home:hover { color: var(--text); }

@media(max-width: 500px) {
  .auth-card { border: none; box-shadow: none; border-radius: 0; padding: 40px 24px; height: 100vh; display: flex; flex-direction: column; justify-content: center; background: transparent; }
}
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>

<a href="index.html" class="back-home">← Back</a>

<div class="auth-card">
  <div class="auth-header">
    <a href="index.html" class="auth-logo">Gig<span>Shield</span></a>
    <p class="auth-subtitle">Welcome back. Login to your dashboard.</p>
  </div>
  
  <form onsubmit="event.preventDefault(); window.location.href='index.html';">
    <div class="form-group">
      <label>Email Address / Phone</label>
      <input type="text" class="form-control" placeholder="Enter your email or phone number" required>
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" placeholder="Enter your password" required>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>
    
    <button type="submit" class="btn-primary">Sign In</button>
  </form>
  
  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Create one</a>
  </div>
</div>

</body>
</html>
