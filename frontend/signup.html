<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GigShield — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #faf8f4;
  --bg2:       #f5f0e8;
  --surface:   #ffffff;
  --card:      #fffefb;
  --peach:     #f4a96a;
  --peach-lt:  #fde9d3;
  --peach-dk:  #e8874a;
  --sage:      #7ab5a0;
  --sage-lt:   #d6ede7;
  --sage-dk:   #4d9982;
  --lavender:  #9b8ec4;
  --lav-lt:    #e8e4f5;
  --lav-dk:    #7b6ba8;
  --rose:      #e07b8a;
  --rose-lt:   #fce8eb;
  --sky:       #6aaccc;
  --sky-lt:    #daeef7;
  --text:      #2d2a26;
  --text2:     #5a5650;
  --muted:     #9a948c;
  --border:    rgba(45,42,38,0.09);
  --shadow-sm: 0 2px 12px rgba(45,42,38,0.07);
  --shadow-md: 0 8px 32px rgba(45,42,38,0.10);
  --shadow-lg: 0 20px 60px rgba(45,42,38,0.12);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
  padding: 40px 20px;
}
.blob { position: absolute; border-radius: 50%; filter: blur(70px); pointer-events: none; z-index: 0; }
body .blob:nth-child(1) { width: 500px; height: 500px; background: rgba(122,181,160,0.15); top: -50px; left: -100px; }
body .blob:nth-child(2) { width: 400px; height: 400px; background: rgba(155,142,196,0.15); bottom: -50px; right: -50px; }

.auth-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 28px;
  padding: 48px 40px;
  width: 100%;
  max-width: 460px;
  position: relative;
  z-index: 1;
  box-shadow: var(--shadow-lg);
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.auth-header { text-align: center; margin-bottom: 32px; }
.auth-logo {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--peach-dk);
  letter-spacing: -0.3px;
  margin-bottom: 8px;
  text-decoration: none;
  display: inline-block;
}
.auth-logo span { color: var(--text); }
.auth-subtitle { color: var(--text2); font-size: 15px; }

.form-group { margin-bottom: 20px; }
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
}
.form-control, .form-select {
  width: 100%;
  background: var(--bg);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 14px 16px;
  border-radius: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-select {
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
}
.form-control:focus, .form-select:focus {
  border-color: var(--sage);
  box-shadow: 0 0 0 3px var(--sage-lt);
}

.btn-primary {
  width: 100%;
  background: linear-gradient(135deg, var(--sage), var(--sage-dk));
  color: #fff;
  border: none;
  padding: 15px;
  border-radius: 50px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  margin-top: 12px;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(77,153,130,0.35);
  letter-spacing: 0.2px;
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 32px rgba(77,153,130,0.45);
}

.auth-footer {
  text-align: center;
  margin-top: 24px;
  font-size: 14px;
  color: var(--text2);
}
.auth-footer a {
  color: var(--peach-dk);
  font-weight: 700;
  text-decoration: none;
  transition: color 0.2s;
}
.auth-footer a:hover { color: var(--text); }

a.back-home {
  position: absolute;
  top: 24px;
  left: 24px;
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
  text-decoration: none;
  z-index: 10;
  transition: color 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
a.back-home:hover { color: var(--text); }

.platform-integration {
  background: var(--bg2);
  border: 1px solid var(--border);
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13px;
  color: var(--text2);
}
.platform-integration .icon {
  font-size: 20px;
}

@media(max-width: 500px) {
  .auth-card { padding: 32px 24px; }
  .form-row { grid-template-columns: 1fr; gap: 0; }
}
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>

<a href="index.html" class="back-home">← Back</a>

<div class="auth-card">
  <div class="auth-header">
    <a href="index.html" class="auth-logo">Gig<span>Shield</span></a>
    <p class="auth-subtitle">Get covered automatically in 2 minutes.</p>
  </div>

  <div class="platform-integration">
    <div class="icon">🔗</div>
    <div>Works seamlessly with <strong>Zomato, Swiggy, and Zepto</strong>. We'll automatically verify your active days.</div>
  </div>
  
  <form onsubmit="event.preventDefault(); window.location.href='index.html';">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" class="form-control" placeholder="As per Aadhaar" required>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" class="form-control" placeholder="Linked to UPI" required>
      </div>
      <div class="form-group">
        <label>City / Zone</label>
        <select class="form-select" required>
          <option value="" disabled selected>Select City</option>
          <option value="delhi">Delhi NCR</option>
          <option value="mumbai">Mumbai</option>
          <option value="bangalore">Bangalore</option>
          <option value="hyderabad">Hyderabad</option>
        </select>
      </div>
    </div>
    
    <div class="form-group">
      <label>Password</label>
      <input type="password" class="form-control" placeholder="Create a password" required>
    </div>
    
    <button type="submit" class="btn-primary">Create Account</button>
  </form>
  
  <div class="auth-footer">
    Already have coverage? <a href="login.html">Sign In</a>
  </div>
</div>

</body>
</html>
